<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计算机知识 · 验证</title>
<link rel="icon" href="Vue3/img/sticker/mascot.png">
<style>
:root{
  --cream:#FAF6EB;--forest:#1E3A24;--sage:#AFCDA8;--ink:#1A2018;
  --marker:#F5E08A;--brick:#B5482A;
  --font-display:"Archivo Black","Noto Sans SC","PingFang SC",sans-serif;
  --font-head:"Poppins","Noto Sans SC","PingFang SC",sans-serif;
  --font-body:-apple-system,"PingFang SC","Noto Sans SC",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font-body);background:var(--cream);color:var(--ink);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
}
.gate{
  background:#fff;border:1px solid #E6DCC2;border-radius:18px;
  max-width:420px;width:100%;padding:40px 34px 34px;text-align:center;
  box-shadow:0 12px 40px rgba(30,58,36,.12);border-top:6px solid var(--sage);
}
.gate .mascot{width:74px;height:74px;border-radius:50%;background:var(--cream);border:4px solid var(--marker);margin-bottom:16px;}
.gate h1{font-family:var(--font-display);font-size:1.4rem;color:var(--forest);margin-bottom:6px;}
.gate .hint{font-size:.9rem;color:#7A6E54;margin-bottom:22px;line-height:1.6;}
.gate .hint b{color:var(--brick);}
.gate input{
  width:100%;font-family:var(--font-body);font-size:1rem;
  padding:13px 16px;border:2px solid #E0D6BB;border-radius:10px;
  background:var(--cream);color:var(--ink);text-align:center;margin-bottom:12px;
  transition:border-color .2s;
}
.gate input:focus{outline:none;border-color:var(--sage);}
.gate button{
  width:100%;font-family:var(--font-head);font-size:1rem;font-weight:600;
  padding:13px;border:none;border-radius:10px;cursor:pointer;
  background:var(--forest);color:#fff;transition:background .2s;
}
.gate button:hover:not(:disabled){background:#16301D;}
.gate button:disabled{opacity:.6;cursor:wait;}
.gate .err{color:var(--brick);font-size:.85rem;margin-top:12px;min-height:20px;}
.gate .foot{margin-top:22px;font-size:.78rem;color:#9A8E70;}
</style>
</head>
<body>

<div class="gate">
  <img class="mascot" src="Vue3/img/sticker/mascot.png" alt="捞鱼">
  <h1>进入计算机知识</h1>
  <p class="hint">这个站点需要验证身份。<br>请输入<b>开发者花名</b>继续。</p>
  <form id="form" autocomplete="off">
    <input id="pwd" type="text" placeholder="请输入开发者花名" autofocus>
    <button type="submit" id="unlockBtn">进入</button>
    <div class="err" id="err"></div>
  </form>
  <div class="foot">🐟 捞鱼工作室 · 计算机知识学习地图</div>
</div>

<!-- ============ 密码门：WebCrypto AES-GCM 解密 ============ -->
<!-- 密码不明文存储；这里只有 salt / 密文 / 迭代次数。密码正确才能解密成功。 -->
<script>
(function(){
"use strict";

// 加密参数（口令经 PBKDF2/SHA-256 派生后用 AES-256-GCM 加密验证串生成；口令不明文存储）
window.__SALT  = "+kEuYzd3lvUmp3wYEnm0gw==";
window.__CIPHER= "b70B84deJiX1BMhO9WziZh5VqpdnkrXcDHT1mTnAwLEoBZgrzuQeDlg/M0sfT9Z73s4=";
window.__ITERS = 150000;

// 已通过验证则直接放行
try{
  if(sessionStorage.getItem('ck_authed')==='1'){
    var d=location.hash.replace('#dest=','');
    location.replace(d?decodeURIComponent(d):'index.html');
    return;
  }
}catch(e){}

function b64ToBuf(b64){
  var bin=atob(b64),len=bin.length,bytes=new Uint8Array(len);
  for(var i=0;i<len;i++) bytes[i]=bin.charCodeAt(i);
  return bytes.buffer;
}

async function deriveKey(password,salt,iters){
  var enc=new TextEncoder();
  var keyMaterial=await crypto.subtle.importKey('raw',enc.encode(password),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:salt,iterations:iters,hash:'SHA-256'},
    keyMaterial,
    {name:'AES-GCM',length:256},
    false,
    ['decrypt']
  );
}

var form=document.getElementById('form');
var input=document.getElementById('pwd');
var err=document.getElementById('err');
var btn=document.getElementById('unlockBtn');

async function tryUnlock(password){
  btn.disabled=true; err.textContent='正在验证…';
  try{
    var pw=(password||'').trim();
    var salt=b64ToBuf(window.__SALT);
    var cipherBuf=b64ToBuf(window.__CIPHER);
    var key=await deriveKey(pw,salt,window.__ITERS);
    // nonce(12) 前置，与加密时一致
    var nonce=cipherBuf.slice(0,12);
    var data=cipherBuf.slice(12);
    await crypto.subtle.decrypt({name:'AES-GCM',iv:nonce},key,data);
    // 解密成功 = 密码正确
    try{sessionStorage.setItem('ck_authed','1');}catch(e){}
    var dest=location.hash.replace('#dest=','')||'index.html';
    location.replace(decodeURIComponent(dest));
  }catch(e){
    err.textContent='花名不对，再想想？';
    input.focus(); input.select();
  }finally{
    btn.disabled=false;
  }
}

form.addEventListener('submit',function(e){
  e.preventDefault();
  tryUnlock(input.value);
});
// Enter 兼容中文输入法
input.addEventListener('keydown',function(e){
  if(e.key==='Enter' && !e.isComposing && e.keyCode!==229){
    e.preventDefault();
    tryUnlock(input.value);
  }
});
input.addEventListener('input',function(){err.textContent='';});
setTimeout(function(){input&&input.focus();},300);

})();
</script>

</body>
</html>
